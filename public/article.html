<!DOCTYPE html>

<html lang="zh-CN">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>ж–Үз« иҜҰжғ… - иҖҒеҸ·еҗ?/title>

  <meta name="description" content="иҖҒеҸ·еҗ§ж–°й—»иө„и®ҜдёҺиҙҰеҸ·иҙӯд№°ж•ҷзЁӢгҖ?>

  <meta name="robots" content="index,follow,max-image-preview:large">

  <link rel="canonical" href="https://www.laohaoba.com/news">

  <meta property="og:type" content="article">

  <meta property="og:site_name" content="иҖҒеҸ·еҗ?>

  <link rel="icon" href="/assets/laohaoba-logo.svg" type="image/svg+xml">

  <link rel="stylesheet" href="/css/laohaoba.css?v=18">
  <script>
  (function () {
    try {
      var id = new URLSearchParams(location.search).get('id');
      var path = location.pathname.replace(/\/+$/, '') || '/';
      // Cloudflare serves article.html as /article вҖ?always jump to static SSG page
      if (id && (path === '/article' || /\/article\.html$/i.test(path))) {
        location.replace('/article/' + encodeURIComponent(id) + '.html');
      }
    } catch (e) {}
  })();
  </script>

</head>

<body>

<div id="app" v-cloak>

<div class="ab-site">

  <div class="ab-notice">

    <div class="center ab-notice-inner">

      <span class="ab-notice-tag">NOTICE</span>

      <span>{{ t('notice.text') }}</span>

    </div>

  </div>



  <header class="ab-header">

    <div class="center ab-header-inner">

      <a class="ab-logo" href="/">

        <img src="/assets/laohaoba-logo.svg" width="48" height="48" alt="иҖҒеҸ·еҗ?>

        <span class="ab-logo-text"><em>иҖҒеҸ·еҗ?/em> <small>LaoHaoBa</small></span>

      </a>

      <form class="ab-search" @submit.prevent="headerSearch">

        <input type="search" v-model="keyword" :placeholder="t('search.placeholder')" :aria-label="t('search.aria')">

        <button type="submit" :aria-label="t('search.aria')">

          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

        </button>

      </form>

      <div class="ab-header-links">

        <button type="button" class="ab-lang-toggle" @click="toggleLang" :aria-label="t('nav.langSwitch')">{{ lang === 'en' ? 'дёӯж–Ү' : 'EN' }}</button>

        <a class="ab-btn-gold" href="https://t.me/xiaoqi2888" target="_blank" rel="noopener">{{ t('nav.partner') }}</a>

        <a class="ab-btn-outline" :href="getOrderUrl()">{{ t('nav.orders') }}</a>

        <a class="ab-btn-red" href="https://t.me/xiaoqi2888" target="_blank" rel="noopener">{{ t('nav.support') }}</a>

      </div>

    </div>

  </header>



  <div class="ab-legal-bar">{{ t('legal.bar') }}</div>



  <div class="loading-mask" v-if="loading">{{ t('loading') }}</div>



  <div class="center ab-article-page" v-else-if="article.title">

    <nav class="ab-breadcrumb">

      <a href="/">{{ t('breadcrumb.home') }}</a><span>вҖ?/span>

      <a href="/news">{{ t('goods.news') }}</a><span>вҖ?/span>

      <span>{{ article.title }}</span>

    </nav>

    <article class="ab-article-card">

      <img v-if="article.cover" class="ab-article-cover" :src="article.cover" :alt="article.title" loading="lazy">

      <h1 class="ab-article-title">{{ article.title }}</h1>

      <div class="ab-article-meta" v-if="article.date">{{ article.date }}</div>

      <div class="ab-article-content" v-html="article.content"></div>

    </article>

  </div>



  <div class="center ab-article-page" v-else>

    <div class="ab-article-card">

      <p>{{ errorMsg || t('article.notFound') }}</p>

      <p><a href="/">{{ t('goods.backHome') }}</a></p>

    </div>

  </div>



  <footer class="ab-footer">

    <div class="center ab-footer-inner">

      <div class="ab-footer-grid">

        <div>

          <h4>{{ t('footer.coop') }}</h4>

          <a href="https://t.me/xiaoqi2888" target="_blank" rel="noopener">{{ t('nav.partner') }}</a>

          <a href="/">{{ t('footer.aboutUs') }}</a>

        </div>

        <div>

          <h4>{{ t('footer.legal') }}</h4>

          <a href="/policy.html">{{ t('footer.refund') }}</a>

          <a href="/policy.html#refund">{{ t('footer.refundPolicy') }}</a>

        </div>

        <div>

          <h4>{{ t('footer.support') }}</h4>

          <a href="https://t.me/xiaoqi2888" target="_blank" rel="noopener">{{ t('footer.contact') }}</a>

          <a :href="getOrderUrl()">{{ t('nav.orders') }}</a>

        </div>

      </div>

      <div class="ab-footer-bottom">{{ t('footer.copyright') }}</div>

    </div>

  </footer>

</div>

</div>



<script src="/js/i18n.js?v=1"></script>

<script>I18n.init();</script>

<script src="/js/seo.js?v=1"></script>

<script src="/js/vendor/vue.min.js"></script>

<script src="/js/vendor/axios.min.js"></script>

<script src="/js/app.js?v=28"></script>

<script>

try {

  new Vue({ el: '#app', mixins: [HeaderMixin], ...ArticleApp });

} catch (e) {

  var msg = typeof I18n !== 'undefined' ? I18n.t('error.pageLoad') : 'йЎөйқўеҠ иҪҪеӨұиҙҘ';

  document.getElementById('app').innerHTML = '<p style="padding:24px">' + msg + '</p>';

}

</script>
